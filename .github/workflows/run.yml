name: 东方财富定时推送任务

on:
  # 定时触发规则：cron表达式为UTC时间
  schedule:
    - cron: '0 7 * * *'  
  # 开启手动触发按钮，方便测试
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库里的代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装Python环境
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # 改成你本地用的Python版本

      # 3. 安装依赖库
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行你的Python脚本
      - name: 执行推送脚本
        env:
          # 注入 DeepSeek 密钥
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 注入 Server 酱 SendKey
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python "东方财富脚本（使用版）.py"
